# ── HealthBridgeAI Cloud Build Pipeline ─────────────────────────────────────
# Trigger: push to main branch
# Steps:
#   1. Lint   (ruff)
#   2. Test   (pytest, unit only — no network)
#   3. Build  webhook image
#   4. Build  processor image  (parallel with webhook)
#   5. Push   both images
#   6. Deploy webhook Cloud Run service
#   7. Deploy processor Cloud Run service
#
# Required Cloud Build substitutions / variables:
#   _GCP_PROJECT   — GCP project ID
#   _REGION        — Cloud Run region (e.g. us-central1)
#   _REPO          — Artifact Registry repo (e.g. us-central1-docker.pkg.dev/$PROJECT/healthbridge)
#   _HF_TOKEN_SECRET — Secret Manager secret name for HuggingFace token
#
# To trigger manually:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions _GCP_PROJECT=my-project,_REGION=us-central1,_REPO=...

substitutions:
  _GCP_PROJECT: ""
  _REGION: "us-central1"
  _REPO: ""
  _HF_TOKEN_SECRET: "huggingface-token"
  _WEBHOOK_SERVICE: "healthbridge-webhook"
  _PROCESSOR_SERVICE: "healthbridge-processor"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # speeds up pip + model download in processor build

availableSecrets:
  secretManager:
    - versionName: "projects/$PROJECT_ID/secrets/${_HF_TOKEN_SECRET}/versions/latest"
      env: "HF_TOKEN"

steps:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  - name: "python:3.11-slim"
    id: lint
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet ruff && ruff check src/ --select E,F,I,N,UP,B,SIM

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  - name: "python:3.11-slim"
    id: test
    waitFor: [lint]
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -e ".[dev]"
        pytest tests/unit -x -q --no-cov

  # ── 3. Build webhook image ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-webhook
    waitFor: [test]
    args:
      - build
      - --file=deploy/Dockerfile
      - --tag=${_REPO}/webhook:$COMMIT_SHA
      - --tag=${_REPO}/webhook:latest
      - --cache-from=${_REPO}/webhook:latest
      - .

  # ── 4. Build processor image (parallel with push-webhook) ────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-processor
    waitFor: [test]
    secretEnv: ["HF_TOKEN"]
    args:
      - build
      - --file=deploy/Dockerfile.processor
      - --tag=${_REPO}/processor:$COMMIT_SHA
      - --tag=${_REPO}/processor:latest
      - --cache-from=${_REPO}/processor:latest
      - --build-arg=HUGGINGFACE_TOKEN=$$HF_TOKEN
      - .

  # ── 5a. Push webhook image ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-webhook
    waitFor: [build-webhook]
    args: [push, "--all-tags", "${_REPO}/webhook"]

  # ── 5b. Push processor image ─────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-processor
    waitFor: [build-processor]
    args: [push, "--all-tags", "${_REPO}/processor"]

  # ── 6. Deploy webhook service ────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-webhook
    waitFor: [push-webhook]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEBHOOK_SERVICE}
      - --image=${_REPO}/webhook:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --timeout=10s
      - --concurrency=80
      - --set-env-vars=GCP_PROJECT_ID=${_GCP_PROJECT}
      - --set-secrets=WHATCHAMP_API_KEY=whatchamp-api-key:latest,WHATCHAMP_PHONE_NUMBER_ID=whatchamp-phone-number-id:latest,WHATCHAMP_WEBHOOK_SECRET=whatchamp-webhook-secret:latest,WHATCHAMP_WEBHOOK_VERIFY_TOKEN=whatchamp-webhook-verify-token:latest,PINECONE_API_KEY=pinecone-api-key:latest,OPENROUTER_API_KEY=openrouter-api-key:latest

  # ── 7. Deploy processor service ──────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-processor
    waitFor: [push-processor]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_PROCESSOR_SERVICE}
      - --image=${_REPO}/processor:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --ingress=internal
      - --min-instances=1
      - --max-instances=5
      - --memory=4Gi
      - --cpu=2
      - --timeout=300s
      - --concurrency=4
      - --set-env-vars=GCP_PROJECT_ID=${_GCP_PROJECT}
      - --set-secrets=WHATCHAMP_API_KEY=whatchamp-api-key:latest,WHATCHAMP_PHONE_NUMBER_ID=whatchamp-phone-number-id:latest,WHATCHAMP_WEBHOOK_SECRET=whatchamp-webhook-secret:latest,WHATCHAMP_WEBHOOK_VERIFY_TOKEN=whatchamp-webhook-verify-token:latest,PINECONE_API_KEY=pinecone-api-key:latest,OPENROUTER_API_KEY=openrouter-api-key:latest,TAVILY_API_KEY=tavily-api-key:latest,HUGGINGFACE_TOKEN=huggingface-token:latest,YARNGPT_API_KEY=yarngpt-api-key:latest,NATLAS_API_KEY=natlas-api-key:latest

images:
  - ${_REPO}/webhook:$COMMIT_SHA
  - ${_REPO}/webhook:latest
  - ${_REPO}/processor:$COMMIT_SHA
  - ${_REPO}/processor:latest
